<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby V.O.X Newsletter</title>
<style>
/* ---------------- GEOCITIES CANVAS SETUP ---------------- */
body {
  font-family: "Comic Sans MS", cursive, sans-serif;
  background-color: #ffb6c1; /* Classic Geocities pink */
  margin: 0;
  padding: 0;
  text-align: center;
}

/* Main container */
.container {
  width: 900px;
  margin: 30px auto;
  box-sizing: border-box;
}

/* Header */
h1 {
  color: #ff69b4;
  text-shadow: 2px 2px #000000;
  font-size: 48px;
  margin-top: 10px;
  margin-bottom: 25px;
}

/* Retro text boxes */
.text-box {
  background-color: #ffffff;
  border: 4px solid #ff69b4;
  padding: 15px;
  margin: 20px auto;
  width: 80%;
  border-radius: 10px;
  color: #000000;
  font-size: 18px;
  box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.15);
}

/* Newsletter icon link container */
.icon-link {
  display: inline-block;
  text-decoration: none;
  margin: 20px auto;
}

/* Newsletter cover image */
.newsletter-icon {
  width: 400px;
  display: block;
  border: 5px dashed #ff69b4;
  border-radius: 12px;
  cursor: pointer;
  transition: transform 0.2s ease;
}

/* Glow & bounce animation on hover */
.icon-link:hover .newsletter-icon {
  border-color: #ff85c1;
  box-shadow: 0 0 25px #ff85c1, 0 0 50px #ff69b4;
  transform: scale(1.05) rotate(-2deg);
  animation: bounce 0.4s ease forwards;
}

/* Tilt and glow on click */
.icon-link:active .newsletter-icon {
  transform: scale(0.95) rotate(5deg);
  box-shadow: 0 0 40px #ff69b4, 0 0 60px #ff85c1;
}

/* Bounce keyframes */
@keyframes bounce {
  0% { transform: scale(1.05) rotate(-2deg); }
  25% { transform: scale(1.10) rotate(-3deg); }
  50% { transform: scale(1.05) rotate(-2deg); }
  75% { transform: scale(1.08) rotate(-1deg); }
  100% { transform: scale(1.05) rotate(-2deg); }
}

/* Vintage blinkie layout wrap */
.blinkie-row {
  margin: 25px auto;
}

.blinkie {
  width: 50px;
  height: 50px;
  margin: 0 10px;
  vertical-align: middle;
}

/* Return navigation link */
.back-home {
  display: inline-block;
  margin: 20px auto 40px auto;
  padding: 12px 25px;
  background: #ff3399;
  color: #ffffff;
  border-radius: 8px;
  text-decoration: none;
  font-size: 18px;
  font-weight: bold;
  box-shadow: 0 0 10px #ff66b2;
  transition: all 0.3s ease;
}

.back-home:hover {
  background: #ff66cc;
  box-shadow: 0 0 20px #ff85c1;
  transform: scale(1.05);
}
</style>
</head>
<body>

<div class="container">
  
  <h1>Baby V.O.X Newsletter!</h1>

  <div class="text-box">
    Hello fans! Welcome to this month’s newsletter page!
  </div>

  <div class="text-box">
    Click on the icon below to view this month’s letter and see all the latest Baby V.O.X updates!
  </div>

  <div class="text-box">
    Don’t forget to check out our gallery, videos, and guestbook while you’re here! 💖
  </div>

  <a href="letter.html" class="icon-link">
    <img src="IMG_2570.jpeg" alt="Newsletter Issue Cover" class="newsletter-icon">
  </a>

  <div class="blinkie-row">
    <img src="FCEE67FF-675A-48D7-8B20-00F20ABD0D56.gif" alt="retro blinkie decoration" class="blinkie">
    <img src="FCEE67FF-675A-48D7-8B20-00F20ABD0D56.gif" alt="retro blinkie decoration" class="blinkie">
    <img src="FCEE67FF-675A-48D7-8B20-00F20ABD0D56.gif" alt="retro blinkie decoration" class="blinkie">
  </div>
  
  <a href="index.html" class="back-home">Back to Home</a>

</div>

</body>
</html>
