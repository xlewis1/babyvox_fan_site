<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baby VOX Group Gallery</title>
  <link rel="icon" type="image/svg+xml" href="babyvox.logo.2.svg">
  <style>
    body {
      font-family: "Comic Sans MS", "Courier New", sans-serif;
      margin: 0;
      padding: 20px;
      text-align: center;
      /* Subtle Y2K diagonal grid lines to keep the site design unified */
      background: repeating-linear-gradient(
        45deg,
        #ffd6e8,
        #ffd6e8 15px,
        #ffe3f0 15px,
        #ffe3f0 30px
      );
      color: #4B0082;
    }

    /* 🛸 Spinning Mini-Logo */
    .mini-logo {
      width: 70px;
      margin: 0 auto 10px auto;
      display: block;
      filter: drop-shadow(1px 1px 0px #ff0080);
      animation: spin 5s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* 📦 Outset Windows Explorer Frame */
    .panel {
      max-width: 950px;
      margin: 0 auto 40px auto;
      padding: 25px;
      background: #ffffff;
      border: 5px outset #ffb3d1;
      box-shadow: 6px 6px 0px rgba(75, 0, 130, 0.25);
    }

    /* 🎤 3D Pop Title Style */
    h1 {
      color: #ffffff;
      font-size: 32px;
      font-family: "Arial Black", Impact, sans-serif;
      text-transform: uppercase;
      margin: 5px 0;
      -webkit-text-stroke: 1.2px #4B0082;
      text-shadow: 2px 2px 0px #ff0080, 3px 3px 0px #4B0082;
    }

    .instructions {
      font-family: "Courier New", monospace;
      font-size: 13px;
      font-weight: bold;
      color: #ff0066;
      background: #fff5fa;
      display: inline-block;
      padding: 6px 12px;
      border: 1px dashed #ff80bf;
      margin-bottom: 25px;
      max-width: 80%;
    }

    /* 🖼️ Gallery grid - 3 per row */
    .member-gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      justify-items: center;
      margin-bottom: 25px;
    }

    .member-gallery a {
      display: block;
      background: #fff5fa;
      padding: 8px;
      border: 2px ridge #ff80bf;
      transition: transform 0.2s, background-color 0.2s;
    }

    .member-gallery a:hover {
      background: #ffe6f2;
      transform: scale(1.04);
    }

    .member-gallery img {
      width: 100%;
      max-width: 240px;
      height: 200px;
      object-fit: cover;
      display: block;
      border: 3px inset #ff0080;
      box-shadow: 2px 2px 0px #4B0082;
    }

    /* 🕹️ Retro Beveled Push-Buttons */
    .back-btn {
      margin: 8px;
      padding: 10px 16px;
      font-weight: bold;
      font-size: 13px;
      font-family: "Comic Sans MS", sans-serif;
      background: #ff80bf;
      color: white !important;
      border-top: 3px solid #ffb3d9;
      border-left: 3px solid #ffb3d9;
      border-right: 3px solid #cc0066;
      border-bottom: 3px solid #cc0066;
      box-shadow: 1px 1px 0px #000000;
      cursor: pointer;
    }

    .back-btn:hover {
      background: #ff47a3;
      border-top: 3px solid #cc0066;
      border-left: 3px solid #cc0066;
      border-right: 3px solid #ffb3d9;
      border-bottom: 3px solid #ffb3d9;
    }

    /* 🎞️ Lightbox Modernized Classic Style */
    .lightbox {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(34, 0, 66, 0.9);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      flex-direction: column;
    }

    .lightbox img {
      max-width: 85%;
      max-height: 75%;
      margin-bottom: 25px;
      cursor: pointer;
      border: 4px solid #ffffff;
      box-shadow: 0px 0px 20px rgba(255, 0, 128, 0.8);
    }

    .lightbox .controls button {
      font-family: Arial, sans-serif;
      font-weight: bold;
      font-size: 18px;
      margin: 0 8px;
      padding: 8px 16px;
      cursor: pointer;
      background: #ff0080;
      color: white;
      border-top: 3px solid #ff66b2;
      border-left: 3px solid #ff66b2;
      border-right: 3px solid #99004d;
      border-bottom: 3px solid #99004d;
      box-shadow: 1px 1px 0px #000000;
    }

    .lightbox .controls button:hover {
      background: #cc0066;
    }

    /* Keep the strict 3-column constraint intact across viewports */
    @media (max-width: 768px) {
      .member-gallery { gap: 12px; }
      .member-gallery a { padding: 4px; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>

<div class="lightbox" id="lightbox">
  <img src="" alt="" id="lightbox-img">
  <div class="controls">
    <button id="prev">&#8592;</button>
    <button id="next">&#8594;</button>
    <button id="close">X</button>
  </div>
</div>

<script>
// Lightbox logic
const gallery = document.querySelectorAll('#group-gallery a');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
let currentIndex = 0;

gallery.forEach((item, index) => {
  item.addEventListener('click', (e) => {
    e.preventDefault();
    currentIndex = index;
    openLightbox();
  });
});

function openLightbox() {
  lightbox.style.display = 'flex';
  lightboxImg.src = gallery[currentIndex].href;
}

function closeLightbox() {
  lightbox.style.display = 'none';
}

function nextImage() {
  currentIndex = (currentIndex + 1) % gallery.length;
  lightboxImg.src = gallery[currentIndex].href;
}

function prevImage() {
  currentIndex = (currentIndex - 1 + gallery.length) % gallery.length;
  lightboxImg.src = gallery[currentIndex].href;
}

// Full resolution on click
lightboxImg.addEventListener('click', () => {
  window.open(lightboxImg.src, '_blank');
});

document.getElementById('close').addEventListener('click', closeLightbox);
document.getElementById('next').addEventListener('click', nextImage);
document.getElementById('prev').addEventListener('click', prevImage);
</script>
