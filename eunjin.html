<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shim Eun Jin Gallery - Baby VOX Fansite</title>
  <link rel="icon" type="image/svg+xml" href="babyvox.logo.2.svg">

  <style>
    body {
      font-family: "Comic Sans MS", "Courier New", sans-serif;
      margin: 0;
      padding: 20px;
      text-align: center;
      /* Signature Y2K diagonal grid lines matching the site theme */
      background: repeating-linear-gradient(
        45deg,
        #ffd6e8,
        #ffd6e8 15px,
        #ffe3f0 15px,
        #ffe3f0 30px
      );
      color: #4B0082;
    }

    /* 🛸 Spinning Mini-Logo */
    .mini-logo {
      width: 70px;
      margin: 0 auto 10px auto;
      display: block;
      filter: drop-shadow(1px 1px 0px #ff0080);
      animation: spin 5s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* 📦 Outset Windows Explorer Frame */
    .page-wrapper {
      max-width: 950px;
      margin: 0 auto 40px auto;
      padding: 25px;
      background: #ffffff;
      border: 5px outset #ffb3d1;
      box-shadow: 6px 6px 0px rgba(75, 0, 130, 0.25);
    }

    /* 🎤 3D Pop Title Style */
    h1 {
      color: #ffffff;
      font-size: 32px;
      font-family: "Arial Black", Impact, sans-serif;
      text-transform: uppercase;
      margin: 5px 0;
      -webkit-text-stroke: 1.2px #4B0082;
      text-shadow: 2px 2px 0px #ff0080, 3px 3px 0px #4B0082;
    }

    .instructions {
      font-family: "Courier New", monospace;
      font-size: 13px;
      font-weight: bold;
      color: #ff0066;
      background: #fff5fa;
      display: inline-block;
      padding: 6px 12px;
      border: 1px dashed #ff80bf;
      margin-bottom: 25px;
      max-width: 80%;
    }

    /* 🖼️ Gallery grid - 3 per row */
    .member-gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      justify-items: center;
      margin-bottom: 25px;
    }

    .member-gallery a {
      display: block;
      background: #fff5fa;
      padding: 8px;
      border: 2px ridge #ff80bf;
      transition: transform 0.2s, background-color 0.2s;
    }

    .member-gallery a:hover {
      background: #ffe6f2;
      transform: scale(1.04);
    }

    .member-gallery img {
      width: 100%;
      max-width: 240px;
      height: 200px;
      object-fit: cover;
      display: block;
      border: 3px inset #ff0080;
      box-shadow: 2px 2px 0px #4B0082;
    }

    /* 🕹️ Retro Beveled Push-Buttons */
    .back-btn {
      margin: 8px;
      padding: 10px 16px;
      font-weight: bold;
      font-size: 13px;
      font-family: "Comic Sans MS", sans-serif;
      background: #ff80bf;
      color: white !important;
      border-top: 3px solid #ffb3d9;
      border-left: 3px solid #ffb3d9;
      border-right: 3px solid #cc0066;
      border-bottom: 3px solid #cc0066;
      box-shadow: 1px 1px 0px #000000;
      cursor: pointer;
    }

    .back-btn:hover {
      background: #ff47a3;
      border-top: 3px solid #cc0066;
      border-left: 3px solid #cc0066;
      border-right: 3px solid #ffb3d9;
      border-bottom: 3px solid #ffb3d9;
    }

    /* 🎞️ Lightbox Overlay Style */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(34, 0, 66, 0.9);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 1000;
    }

    .lightbox img {
      max-width: 85%;
      max-height: 75%;
      margin-bottom: 25px;
      cursor: pointer;
      border: 4px solid #ffffff;
      box-shadow: 0px 0px 20px rgba(255, 0, 128, 0.8);
    }

    .lightbox .controls button {
      font-family: Arial, sans-serif;
      font-weight: bold;
      font-size: 18px;
      margin: 0 8px;
      padding: 8px 16px;
      cursor: pointer;
      background: #ff0080;
      color: white;
      border-top: 3px solid #ff66b2;
      border-left: 3px solid #ff66b2;
      border-right: 3px solid #99004d;
      border-bottom: 3px solid #99004d;
      box-shadow: 1px 1px 0px #000000;
    }

    .lightbox .controls button:hover {
      background: #cc0066;
    }

    @media (max-width: 768px) {
      .member-gallery { gap: 12px; }
      .member-gallery a { padding: 4px; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>

<img src="babyvox.logo.2.svg" alt="Baby VOX Logo" class="mini-logo">

<div class="page-wrapper">

  <h1>Shim Eun Jin Gallery</h1>
  <p class="instructions">
    Click an image to open the lightbox. Use arrow keys to navigate. Click image for full resolution.
  </p>

  <div id="eunjin-gallery" class="member-gallery">
    <a href="EUNJIN.jpg"><img src="EUNJIN.jpg" alt="Shim Eun Jin"></a>
    <a href="shim_3rd13.jpg"><img src="shim_3rd13.jpg" alt="Shim Eun Jin 3rd Album 13"></a>
    <a href="shim_3rd14.jpg"><img src="shim_3rd14.jpg" alt="Shim Eun Jin 3rd Album 14"></a>
    <a href="eunjin5.jpg"><img src="eunjin5.jpg" alt="Shim Eun Jin 5"></a>
    <a href="eunjin6.jpg"><img src="eunjin6.jpg" alt="Shim Eun Jin 6"></a>
    <a href="shimeunjin7.jpg"><img src="shimeunjin7.jpg" alt="Shim Eun Jin 7"></a>
    <a href="eunjin11_upscaled.jpg"><img src="eunjin11_upscaled.jpg" alt="Shim Eun Jin 11 Upscaled"></a>
    <a href="eunjin14.jpg"><img src="eunjin14.jpg" alt="Shim Eun Jin 14"></a>
    <a href="Eunjin12_upscaled.jpg"><img src="Eunjin12_upscaled.jpg" alt="Shim Eun Jin 12 Upscaled"></a>
    <a href="Eunjin45.jpg"><img src="Eunjin45.jpg" alt="Shim Eun Jin 45"></a>
    <a href="Eunjin46.png"><img src="Eunjin46.png" alt="Shim Eun Jin 46"></a>
    <a href="IMG_4656.jpg"><img src="IMG_4656.jpg" alt="Shim Eun Jin 4656"></a>

    <a href="IMG_4658.jpg"><img src="IMG_4658.jpg" alt="Shim Eun Jin 4658"></a>  
    <a href="IMG_2062.jpeg"><img src="IMG_2062.jpeg" alt="Shim Eun Jin 2062"></a>
    <a href="IMG_2274.jpeg"><img src="IMG_2274.jpeg" alt="Shim Eun Jin 2274"></a>
    <a href="IMG_2245.jpeg"><img src="IMG_2245.jpeg" alt="Shim Eun Jin 2245"></a>

    <a href="FB_IMG_1766678631506.jpeg"><img src="FB_IMG_1766678631506.jpeg" alt="Shim Eun Jin FB Archive 2"></a>
  </div>

  <div class="lightbox" id="lightbox">
    <img src="" id="lightbox-img" alt="Lightbox Preview">
    <div class="controls">
      <button id="prev">&#8592;</button>
      <button id="next">&#8594;</button>
      <button id="close">X</button>
    </div>
  </div>

  <div>
    <button class="back-btn" onclick="window.location.href='gallery.html'">Back to Gallery</button>
    <button class="back-btn" onclick="window.location.href='index.html'">Back to Home</button>
    <button class="back-btn" onclick="window.location.href='eunjinpage2.html'">Next Page →</button>
  </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const gallery = document.querySelectorAll('#eunjin-gallery a');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');
  let currentIndex = 0;

  function openLightbox(index){
    currentIndex = index;
    lightbox.style.display = 'flex';
    lightboxImg.src = gallery[currentIndex].href;
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox(){
    lightbox.style.display = 'none';
    document.body.style.overflow = 'auto';
  }

  function nextImage(){
    currentIndex = (currentIndex + 1) % gallery.length;
    lightboxImg.src = gallery[currentIndex].href;
  }

  function prevImage(){
    currentIndex = (currentIndex - 1 + gallery.length) % gallery.length;
    lightboxImg.src = gallery[currentIndex].href;
  }

  gallery.forEach((item, index) => {
    item.addEventListener('click', e => {
      e.preventDefault();
      openLightbox(index);
    });
  });

  document.getElementById('close').onclick = closeLightbox;
  document.getElementById('next').onclick = nextImage;
  document.getElementById('prev').onclick = prevImage;

  lightbox.addEventListener('click', e => {
    if(e.target === lightbox) closeLightbox();
  });

  document.addEventListener('keydown', e => {
    if(lightbox.style.display === 'flex'){
      if(e.key === 'ArrowRight') nextImage();
      if(e.key === 'ArrowLeft') prevImage();
      if(e.key === 'Escape') closeLightbox();
    }
  });

  lightboxImg.addEventListener('click', () => {
    window.open(lightboxImg.src, '_blank');
  });
});
</script>

</body>
</html>
