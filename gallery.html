<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="babyvox.logo.2.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baby V.O.X Gallery</title>
  <style>
    body {
      font-family: "Comic Sans MS", "Courier New", sans-serif;
      /* Signature Y2K diagonal grid lines matching the rest of the shrine */
      background: repeating-linear-gradient(
        45deg,
        #ffd6e8,
        #ffd6e8 15px,
        #ffe3f0 15px,
        #ffe3f0 30px
      );
      margin: 0;
      padding: 0;
      text-align: center;
      color: #4B0082;
    }

    /* 🛸 Spinning Logo with Drop Shadow */
    .logo {
      width: 100px;
      margin: 20px auto 5px auto;
      display: block;
      filter: drop-shadow(2px 2px 0px #ff0080);
      animation: spin 6s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* 🎤 3D Pop Title Style */
    h1 {
      color: #ffffff;
      font-size: 38px;
      font-family: "Arial Black", Impact, sans-serif;
      text-transform: uppercase;
      margin-top: 10px;
      margin-bottom: 5px;
      -webkit-text-stroke: 1.5px #4B0082;
      text-shadow: 2px 2px 0px #ff0080, 4px 4px 0px #4B0082;
    }

    /* 📣 Scrolling Ticker */
    marquee {
      max-width: 650px;
      background: #4B0082;
      color: #00ffcc;
      font-family: "Courier New", monospace;
      font-weight: bold;
      font-size: 13px;
      padding: 5px;
      border: 2px inset #ff80bf;
      margin: 10px auto;
      display: block;
    }

    p.instruction {
      font-family: "Courier New", monospace;
      font-weight: bold;
      font-size: 14px;
      color: #ff0066;
      background: #ffffff;
      display: inline-block;
      padding: 4px 10px;
      border: 1px dashed #ff80bf;
      margin-bottom: 20px;
    }

    /* 📦 Outset Vintage Windows Explorer Frame */
    .gallery-frame {
      display: inline-block;
      max-width: 650px;
      border: 5px outset #ffb3d1;
      padding: 25px;
      background: #ffffff;
      box-shadow: 6px 6px 0px rgba(75, 0, 130, 0.25);
      margin-bottom: 30px;
    }

    /* 🎛️ Clean 3-Column Grid Layout */
    .gallery-icons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      justify-content: center;
      margin-bottom: 25px;
    }

    /* 🗂️ Interactive Album Items */
    .gallery-item {
      background: #fff5fa;
      border: 2px ridge #ff80bf;
      padding: 10px;
      cursor: pointer;
      transition: transform 0.2s, background-color 0.2s;
    }

    .gallery-item:hover {
      background: #ffe6f2;
      transform: scale(1.05);
    }

    .gallery-item img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border: 3px inset #ff0080;
      background: #ffffff;
      box-shadow: 2px 2px 0px #4B0082;
      display: block;
      margin: 0 auto 8px auto;
    }

    /* 🏷️ Micro Text Labels */
    .gallery-item span {
      font-family: "Arial Black", sans-serif;
      font-size: 12px;
      color: #4B0082;
      text-transform: uppercase;
      display: block;
    }

    /* 🕹️ Retro Beveled Push-Buttons */
    .back-btn {
      margin-top: 10px;
      padding: 10px 20px;
      font-weight: bold;
      background: #ff80bf;
      color: white !important;
      border-top: 3px solid #ffb3d9;
      border-left: 3px solid #ffb3d9;
      border-right: 3px solid #cc0066;
      border-bottom: 3px solid #cc0066;
      box-shadow: 1px 1px 0px #000000;
      cursor: pointer;
      font-size: 14px;
      font-family: "Comic Sans MS", sans-serif;
    }

    .back-btn:hover {
      background: #ff47a3;
      border-top: 3px solid #cc0066;
      border-left: 3px solid #cc0066;
      border-right: 3px solid #ffb3d9;
      border-bottom: 3px solid #ffb3d9;
    }

    /* Responsive shift for small windows */
    @media (max-width: 550px) {
      .gallery-icons {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>

<img src="babyvox.logo.2.svg" alt="Baby VOX Logo" class="logo">

<h1>Baby V.O.X Gallery</h1>

<marquee scrollamount="4">
  *** PHOTO ARCHIVE OVERFLOW * PRESS PHOTOS, LIVE SHOW SCREENCAPS, AND MAGAZINE SCANS UPDATED DAILY! ***
</marquee>

<p class="instruction">Select a media folder to view individual photo archives!</p>
<br>

<div class="gallery-frame">
  <div class="gallery-icons">
    
    <div class="gallery-item" onclick="openGallery('group.html')">
      <img src="voxicon.gif" alt="Baby VOX Group">
      <span>[ Group Clip ]</span>
    </div>

    <div class="gallery-item" onclick="openGallery('ez.html')">
      <img src="9AC44AF6-F2D0-4737-B57D-6235A6A88451.gif" alt="Kim EZ">
      <span>[ Kim EZ ]</span>
    </div>

    <div class="gallery-item" onclick="openGallery('heejin.html')">
      <img src="9EF6FA94-5256-4BC8-A5CA-C81C1452A5CC.gif" alt="Lee Heejin">
      <span>[ Lee Heejin ]</span>
    </div>

    <div class="gallery-item" onclick="openGallery('eunjin.html')">
      <img src="IMG_2304.jpeg" alt="Shim Eun Jin">
      <span>[ Shim Eun Jin ]</span>
    </div>

    <div class="gallery-item" onclick="openGallery('eunhye.html')">
      <img src="D96498F8-FF33-4F95-9B2F-B582920044C0.gif" alt="Yoon Eun Hye">
      <span>[ Eun Hye ]</span>
    </div>

    <div class="gallery-item" onclick="openGallery('miyoun.html')">
      <img src="7461FA96-C93D-4E07-8140-E2F68988762F.gif" alt="Kan Mi Youn">
      <span>[ Mi Youn ]</span>
    </div>

  </div>

  <button class="back-btn" onclick="window.location.href='index.html'">← Back to Home</button>
</div>

<script>
function openGallery(url) {
  window.location.href = url;
}
</script>

</body>
</html>
